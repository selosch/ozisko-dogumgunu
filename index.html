<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozişko için ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Oswald:wght@500&display=swap');

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
            color: white;
            background: #f6c1cc;
            cursor: url('hearth.png'), auto;
        }

        button, a {
            cursor: url('hearth.png'), pointer !important;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0; 
            pointer-events: none;
            transition: opacity 1s ease-in-out; 
        }

        .active {
            opacity: 1;
            pointer-events: auto;
        }

        #loading { background: #f6c1cc; z-index: 100; opacity: 1; pointer-events: auto; }
        .loader-heart { font-size: 80px; animation: pulse 1s infinite; margin-bottom: 20px; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        #welcome { z-index: 50; }
        #intro { z-index: 40; }
        #intro img { width: 280px; margin-bottom: 20px; max-width: 80%; }

        #celebration { z-index: 35; background: #f6c1cc; }
        .pop-in { width: 280px; max-width: 80%; margin-bottom: 30px; transform: scale(0); animation: popInAnim 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popInAnim { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        #underwater {
            z-index: 30;
            background: linear-gradient(180deg, #102538 0%, #1a5163 50%, #207178 100%);
            overflow: hidden;
        }
        
        #underwater::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 50% 20%, rgba(255,255,255,0.15), transparent 60%);
            animation: waterLight 8s linear infinite alternate; 
            pointer-events: none;
        }

        .final-image { width: 90%; max-width: 280px; margin-bottom: 10px; z-index: 3; position: relative; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }

        .bday-title { z-index: 3; margin-bottom: 15px; line-height: 1; }
        .bday-title .happy { font-family: 'Dancing Script', cursive; font-size: 40px; color: #ffffff; }
        .bday-title .bday { font-family: 'Oswald', sans-serif; font-size: 45px; color: #e2f1f8; letter-spacing: 2px; }

        .text { 
            max-width: 650px; 
            width: 90%; 
            margin: auto; 
            padding: 20px; 
            font-size: 17px; 
            line-height: 1.6; 
            background: rgba(20, 45, 60, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px; 
            backdrop-filter: blur(8px); 
            z-index: 3; 
            min-height: 180px;
            text-align: left; /* Okuma kolaylığı için sola yasladım */
        }

        button { padding: 15px 35px; font-size: 20px; border: none; border-radius: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        #enter, #yes, #knewItBtn, #thenBtn { background: #ff4f87; color: white; font-weight: bold; margin-top: 10px; }
        #no { background: #555; color: white; position: relative; transition: left 0.3s ease, top 0.3s ease; }

        .heart { position: absolute; font-size: 24px; pointer-events: none; animation: floatHeart 1s ease-out forwards; z-index: 999; }
        @keyframes floatHeart { 0% { transform: scale(0.5) translateY(0); opacity: 1; } 100% { transform: scale(1.5) translateY(-50px); opacity: 0; } }

        .confetti { position: absolute; top: -10px; width: 10px; height: 10px; z-index: 1000; animation: fallConfetti linear forwards; }
        @keyframes fallConfetti { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        .bubble { 
            position: absolute; 
            bottom: -100px; 
            border-radius: 50%; 
            border: 2px solid rgba(255, 255, 255, 0.5);
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.6), rgba(255, 255, 255, 0.05) 60%);
            animation: bubbleUp linear infinite; 
            z-index: 1; 
        }
        @keyframes bubbleUp { 0% { transform: translateY(0) scale(1); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(-120vh) scale(1.3); opacity: 0; } }

        .star { position: absolute; background: #ffe359; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); animation: twinkle alternate infinite; z-index: 2; }
        @keyframes twinkle { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.2); opacity: 1; } }

        .music { position: fixed; top: 20px; right: 20px; z-index: 1000; }
        .music button { padding: 10px 20px; font-size: 16px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px); color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 20px; }
    </style>
</head>
<body>

    <div class="music">
        <button id="musicBtn" onclick="playMusic()">🎵 Müziği Başlat</button>
    </div>
    
    <audio id="bgMusic" loop>
        <source src="ozi.mp3" type="audio/mpeg">
    </audio>

    <div id="loading" class="screen active">
        <div class="loader-heart">❤️</div>
        <h2>Bu site Ozişko için hazırlanıyor…</h2>
    </div>

    <div id="welcome" class="screen">
        <h1>Bu site sadece Ozişko için hazırlanmıştır ❤️</h1>
        <button id="enter">Siteye Gir ❤️</button>
    </div>

    <div id="intro" class="screen">
        <img src="hearth.png" alt="Kalpli Axolotl"> 
        <h1>Beni seviyor musun?</h1>
        <div class="button-container">
            <button id="yes">Evet!</button>
            <button id="no">Hayır</button>
        </div>
    </div>

    <div id="celebration" class="screen">
        <img src="love.png" alt="Aşk" class="pop-in" id="loveImage">
        <button id="knewItBtn">Beni sevdiğini biliyordum</button>
        <button id="thenBtn" style="display: none;">O zamaaaaaan</button>
    </div>

    <div id="underwater" class="screen">
        <div id="stars-container"></div>
        <img src="axolotl.png" alt="Doğum Günü Axolotl" class="final-image"> 
        <div class="bday-title">
            <div class="happy">happy</div>
            <div class="bday">BIRTHDAY TO YOU!</div>
        </div>
        <div id="typewriterText" class="text"></div>
    </div>

    <script>
        const fullMessage = "Hayatımda olduğun için ne kadar şanslı, ne kadar mutlu olduğumu kelimelerle anlatmak çok zor. Seninle tanıştığımdan beri hayatımın rengi, gidişatı değişti. Gülüşün, bana bakışın, yanımda olduğunda hissettiğim huzur ve daha birçok şey… hepsi benim için çok özel ve çok değerli. \n\n İyi ki doğmuşsun, iyi ki benim hayatıma girmişsin. Seninle daha paylaşacağımız çok güzel anılar, kahkahalar ve hayaller var. \n\n Yeni yaşın sana sağlık, mutluluk ve tüm hayallerini getirsin. Ama en çok da hep yanımda olmanı getirsin. \n\n Doğum günün kutlu olsun aşkım. İyi ki varsın. ❤️";

        function showScreen(screenId) {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(s => {
                s.classList.remove('active');
            });
            const target = document.getElementById(screenId);
            if(target) {
                target.classList.add('active');
            }
        }

        setTimeout(() => { showScreen('welcome'); }, 2500);

        document.getElementById("enter").onclick = () => { showScreen('intro'); };

        const yesBtn = document.getElementById("yes");
        const noBtn = document.getElementById("no");
        let yesSize = 20;

        noBtn.addEventListener("mouseover", () => {
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;
            const randomX = Math.max(20, Math.random() * maxX);
            const randomY = Math.max(20, Math.random() * maxY);
            noBtn.style.position = "fixed";
            noBtn.style.left = randomX + "px";
            noBtn.style.top = randomY + "px";
            yesSize += 10;
            yesBtn.style.fontSize = yesSize + "px";
            yesBtn.style.padding = (yesSize/1.5) + "px " + (yesSize) + "px";
        });

        yesBtn.onclick = () => {
            showScreen('celebration');
            fireConfetti();
        };

        document.getElementById('knewItBtn').onclick = () => {
            document.getElementById('knewItBtn').style.display = 'none';
            document.getElementById('thenBtn').style.display = 'inline-block';
        };

        document.getElementById('thenBtn').onclick = () => {
            showScreen('underwater');
            startBubbles();
            createStars();
            // Daktilo başlatma
            i = 0;
            document.getElementById("typewriterText").innerHTML = "";
            setTimeout(typeWriter, 1500); 
        };

        let i = 0;
        function typeWriter() {
            if (i < fullMessage.length) {
                let char = fullMessage.charAt(i);
                if (char === "\n") {
                    document.getElementById("typewriterText").innerHTML += "<br>";
                } else {
                    document.getElementById("typewriterText").innerHTML += char;
                }
                i++;
                setTimeout(typeWriter, 45); 
            }
        }

        function fireConfetti() {
            const colors = ['#ff4f87', '#ff2a6d', '#ffffff', '#ffd700', '#ffb6c1'];
            for(let k=0; k<150; k++) {
                let conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                conf.style.animationDuration = (Math.random() * 3 + 2) + 's';
                document.body.appendChild(conf);
                setTimeout(() => conf.remove(), 5000); 
            }
        }

        document.addEventListener("mousemove", (e) => {
            let heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "❤️";
            heart.style.left = (e.pageX - 12) + "px";
            heart.style.top = (e.pageY - 12) + "px";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 800);
        });

        function createStars() {
            const container = document.getElementById("stars-container");
            for(let j=0; j<25; j++) {
                let star = document.createElement("div");
                star.className = "star";
                star.style.left = (Math.random() * 95) + "vw";
                star.style.top = (Math.random() * 65) + "vh";
                let size = Math.random() * 15 + 10;
                star.style.width = size + "px";
                star.style.height = size + "px";
                star.style.animationDuration = (Math.random() * 1 + 1) + "s";
                container.appendChild(star);
            }
        }

        function startBubbles() {
            setInterval(() => {
                let bubble = document.createElement("div");
                bubble.className = "bubble";
                let size = Math.random() * 30 + 15; 
                bubble.style.width = size + "px";
                bubble.style.height = size + "px";
                bubble.style.left = Math.random() * 100 + "vw";
                bubble.style.animationDuration = (Math.random() * 5 + 4) + "s";
                document.getElementById("underwater").appendChild(bubble);
                setTimeout(() => bubble.remove(), 8000);
            }, 350);
        }

        let isPlaying = false;
        function playMusic() {
            const bgMusic = document.getElementById("bgMusic");
            const btn = document.getElementById("musicBtn");
            if (!isPlaying) {
                bgMusic.play();
                btn.innerHTML = "🎵 Müziği Durdur";
                isPlaying = true;
            } else {
                bgMusic.pause();
                btn.innerHTML = "🎵 Müziği Başlat";
                isPlaying = false;
            }
        }
    </script>
</body>
</html>
